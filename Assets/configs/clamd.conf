# ClamGUI Custom ClamAV Daemon Configuration
# This configuration is used exclusively by ClamGUI
# Location: ~/Library/Application Support/ClamGUI/clamd.conf

# ============================================================
# GENERAL SETTINGS
# ============================================================

# Run as current user (no daemon user change)
# User is inherited from launching process

# Log file for ClamGUI's clamd instance
LogFile ~/Library/Application Support/ClamGUI/clamd.log
LogTime yes
LogVerbose false

# ============================================================
# SOCKET CONFIGURATION - ClamGUI Specific
# ============================================================

# Custom socket path exclusive to ClamGUI
# This socket is ONLY used by ClamGUI, not system clamd
LocalSocket ~/Library/Application Support/ClamGUI/clamd.sock

# Socket permissions (owner read/write)
LocalSocketMode 600

# Fix socket state on startup (remove stale socket files)
FixState yes

# ============================================================
# DATABASE SETTINGS
# ============================================================

# Use system database location (Homebrew default)
# Adjust if you have a custom database location
Database /opt/homebrew/share/clamav
# Database /usr/local/share/clamav

# Database directory for ClamGUI (optional, can use system)
# PrivateDatabase ~/Library/Application Support/ClamAV/database

# ============================================================
# PERFORMANCE SETTINGS
# ============================================================

# Maximum concurrent connections
MaxConnectionQueueLength 30

# Maximum threads for scanning
MaxThreads 10

# Timeout for reading data
ReadTimeout 180

# ============================================================
# SCAN SETTINGS
# ============================================================

# File types to scan
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanMail yes
ScanPDF yes
ScanHTML yes
ScanXML yes
ScanHFS yes

# Archive scanning
ScanArchive yes
BlockEncryptedDocs no

# ============================================================
# FILE SIZE LIMITS
# ============================================================

# Maximum file size to scan (2GB - supports large files)
MaxFileSize 2048M

# Maximum data to scan per file (4GB)
MaxScanSize 4096M

# Maximum number of files to scan in archive
MaxFiles 15000

# Maximum recursion depth in archives
MaxRecursion 20

# Maximum files per archive
MaxFilesPerArchive 1000

# ============================================================
# CLAMGUI SPECIFIC NOTES
# ============================================================
# - This config creates a socket at:
#   ~/Library/Application Support/ClamGUI/clamd.sock
# - ClamGUI is configured to ONLY connect to this socket
# - System clamd instances are ignored
# - Multiple ClamGUI instances will share this socket
# - Start with: clamd --config-file=<path-to-this-file>
# ============================================================
